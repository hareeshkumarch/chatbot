[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 140
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "SIM", "UP", "RUF"]
ignore = ["E501", "RUF001", "RUF002", "RUF003", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
